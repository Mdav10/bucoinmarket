services:
  - type: web
    name: bucoinmarket
    env: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      gunicorn run:app --workers 4 --threads 2 --worker-class gthread --timeout 120
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
