{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-3 mb-3">
        <div class="stats-card">
            <h6>Total Products</h6>
            <div class="stat-number">{{ total_products }}</div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="stats-card">
            <h6>Total Orders</h6>
            <div class="stat-number">{{ total_orders }}</div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="stats-card">
            <h6>Total Users</h6>
            <div class="stat-number">{{ total_users }}</div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="stats-card">
            <h6>Pending Orders</h6>
            <div class="stat-number">{{ pending_orders }}</div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h5>Admin Actions</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <a href="{{ url_for('products.add_product') }}" class="btn btn-primary w-100">
                            <i class="bi bi-plus-circle"></i> Add Product
                        </a>
                    </div>
                    <div class="col-md-4 mb-3">
                        <a href="{{ url_for('products.list_products') }}" class="btn btn-success w-100">
                            <i class="bi bi-list"></i> Manage Products
                        </a>
                    </div>
                    <div class="col-md-4 mb-3">
                        <a href="{{ url_for('orders.history') }}" class="btn btn-info w-100">
                            <i class="bi bi-box"></i> Manage Orders
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
