{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>System Settings</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('superadmin.settings') }}">
                    <div class="mb-3">
                        <label for="site_name" class="form-label">Site Name</label>
                        <input type="text" class="form-control" id="site_name" name="site_name" value="{{ site_name }}">
                    </div>
                    <div class="mb-3">
                        <label for="site_description" class="form-label">Site Description</label>
                        <textarea class="form-control" id="site_description" name="site_description" rows="3">{{ site_description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="buc_exchange_rate" class="form-label">BuCoin Exchange Rate (1 BUC = X BIF)</label>
                        <input type="number" class="form-control" id="buc_exchange_rate" name="buc_exchange_rate" step="0.01" value="{{ buc_exchange_rate }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Settings</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
